services:
  - type: web
    name: kronos-v4-worker
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r workers/requirements.txt
    startCommand: uvicorn workers.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: WORKER_API_KEY
        sync: false
      - key: KRONOS_API_KEY
        sync: false
      - key: KRONOS_API_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BINANCE_API_BASE
        value: https://api.binance.com
      - key: BINANCE_FAPI_BASE
        value: https://fapi.binance.com
